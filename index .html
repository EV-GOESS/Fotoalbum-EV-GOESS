<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EV Göss – Fotoalbum</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1a0f;
      --surface:     #122015;
      --card:        #1a2e1c;
      --border:      #2a4a2d;
      --green:       #1e7a2e;
      --green-light: #28a03b;
      --green-bright:#2ecc48;
      --gold:        #c8972a;
      --gold-light:  #e0aa30;
      --text:        #e8f4ea;
      --muted:       #7a9e7d;
      --danger:      #c0392b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 3px solid var(--gold);
      padding: 0 24px;
      display: flex; align-items: center; gap: 14px;
      height: 68px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,.4);
    }
    .header-logo {
      width: 48px; height: 48px;
      border-radius: 50%; overflow: hidden;
      border: 2px solid var(--gold);
      flex-shrink: 0; background: #fff;
    }
    .header-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .header-title {
      font-family: 'Oswald', sans-serif;
      font-size: 22px; font-weight: 700;
      letter-spacing: 1.5px; line-height: 1.1;
    }
    .header-sub {
      font-size: 10px; color: var(--gold);
      letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
    }
    .header-spacer { flex: 1; }
    .header-badge {
      font-size: 12px; color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 13px;
    }

    /* ── MAIN ── */
    .main { padding: 28px 24px; max-width: 1100px; margin: 0 auto; }

    .section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 18px;
    }
    .row-between {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
      transition: background .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover { background: var(--green-light); }
    .btn-gold  { background: var(--gold); color: #0d1a0f; }
    .btn-gold:hover { background: var(--gold-light); }
    .btn-ghost {
      background: var(--card); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--green); color: var(--green-bright); }
    .btn-sm { padding: 7px 13px; font-size: 13px; }

    /* ── NEW ALBUM FORM ── */
    .new-album-form {
      background: var(--card);
      border: 1px solid var(--green);
      border-radius: 12px;
      padding: 18px; margin-bottom: 22px;
      display: flex; gap: 10px; align-items: center;
    }
    .new-album-form input {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 10px 14px;
      font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
    }
    .new-album-form input:focus { border-color: var(--green); }
    .new-album-form input::placeholder { color: var(--muted); }

    /* ── ALBUMS GRID ── */
    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 16px; margin-bottom: 36px;
    }
    .album-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 14px 14px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: border-color .2s, transform .15s, box-shadow .2s;
    }
    .album-card:hover {
      border-color: var(--green);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(30,122,46,.2);
    }
    .album-card-thumb {
      width: 100%; aspect-ratio: 4/3;
      background: var(--surface); border-radius: 8px;
      margin-bottom: 12px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .album-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .album-card-thumb-empty { font-size: 36px; opacity: .35; }
    .album-card-name {
      font-family: 'Oswald', sans-serif;
      font-size: 16px; font-weight: 600;
      color: var(--text); margin-bottom: 3px;
    }
    .album-card-count { font-size: 12px; color: var(--muted); }
    .album-delete-btn {
      position: absolute; top: 10px; right: 10px;
      background: rgba(192,57,43,.15);
      border: 1px solid rgba(192,57,43,.3);
      border-radius: 6px; color: var(--danger);
      padding: 4px 7px; cursor: pointer;
      font-size: 14px; display: none;
      transition: background .15s;
    }
    .album-card:hover .album-delete-btn { display: flex; align-items: center; }
    .album-delete-btn:hover { background: rgba(192,57,43,.35); }

    .album-new {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: 12px; padding: 16px;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; min-height: 170px;
      color: var(--muted);
      transition: border-color .2s, color .2s;
    }
    .album-new:hover { border-color: var(--green); color: var(--green-bright); }
    .album-new span { font-size: 13px; font-weight: 500; }

    /* ── PHOTO VIEW ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-family: 'Inter', sans-serif;
      font-size: 14px; padding: 6px 0; margin-bottom: 20px;
      transition: color .15s;
    }
    .back-btn:hover { color: var(--text); }

    .album-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .album-header-title {
      font-family: 'Oswald', sans-serif;
      font-size: 26px; font-weight: 700;
    }
    .album-header-icon { font-size: 26px; }
    .album-header-count { font-size: 14px; color: var(--muted); }

    /* ── UPLOAD ZONE ── */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 14px;
      padding: 36px 24px; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s; margin-bottom: 28px;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--green);
      background: rgba(30,122,46,.07);
    }
    .upload-zone-icon { color: var(--gold); font-size: 32px; margin-bottom: 10px; }
    .upload-zone-title {
      font-family: 'Oswald', sans-serif;
      font-size: 17px; font-weight: 600; margin-bottom: 5px;
    }
    .upload-zone-sub { font-size: 13px; color: var(--muted); }

    /* ── UPLOAD PROGRESS ── */
    .upload-progress-wrap { margin-bottom: 14px; }
    .upload-progress {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 12px;
    }
    .upload-progress-name {
      font-size: 13px; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .upload-bar-wrap {
      width: 120px; height: 5px;
      background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .upload-bar { height: 100%; background: var(--green); border-radius: 3px; transition: width .2s; }
    .upload-pct { font-size: 13px; color: var(--muted); white-space: nowrap; }

    /* ── PHOTOS GRID ── */
    .photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .photo-item {
      aspect-ratio: 1; border-radius: 10px; overflow: hidden;
      position: relative; cursor: pointer;
      background: var(--card); border: 1px solid var(--border);
      transition: transform .15s, box-shadow .2s;
    }
    .photo-item:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(0,0,0,.4); z-index: 2; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.55); opacity: 0;
      transition: opacity .2s;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-item:hover .photo-overlay { opacity: 1; }
    .photo-del-btn {
      background: rgba(192,57,43,.85); border: none;
      border-radius: 6px; color: #fff;
      padding: 7px 9px; cursor: pointer; font-size: 15px;
    }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 14px; opacity: .45; }
    .empty-title {
      font-family: 'Oswald', sans-serif;
      font-size: 20px; color: var(--text); margin-bottom: 8px;
    }
    .empty-sub { font-size: 14px; }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.93);
      align-items: center; justify-content: center;
    }
    .lightbox.active { display: flex; }
    .lightbox-img { max-width: 90vw; max-height: 88vh; border-radius: 6px; object-fit: contain; }
    .lb-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(255,255,255,.12); border: none;
      border-radius: 50%; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; font-size: 20px;
      transition: background .15s;
    }
    .lb-close:hover { background: rgba(255,255,255,.25); }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.1); border: none;
      border-radius: 50%; width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; font-size: 22px;
      transition: background .15s;
    }
    .lb-nav:hover { background: rgba(255,255,255,.22); }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }
    .lb-counter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.6); color: #fff;
      font-size: 13px; padding: 5px 14px; border-radius: 20px;
    }

    /* ── TOAST ── */
    .toast {
      display: none; position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--green); color: #fff;
      padding: 12px 22px; border-radius: 10px;
      font-size: 14px; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.35);
      z-index: 2000;
    }
    .toast.show {
      display: block;
      animation: toastIn .25s ease;
    }
    @keyframes toastIn {
      from { opacity:0; transform: translateX(-50%) translateY(10px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }

    /* hidden file input */
    #file-input { display: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .header { padding: 0 14px; gap: 10px; }
      .header-title { font-size: 18px; }
      .main { padding: 18px 14px; }
      .albums-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
      .photos-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>

      <input id="new-album-input" type="text" placeholder="Albumname eingeben …"
        onkeydown="handleAlbumFormKey(event)" />
      <button class="btn btn-green btn-sm" onclick="createAlbum()">Erstellen</button>
      <button class="btn btn-ghost btn-sm" onclick="hideNewAlbumForm()">Abbrechen</button>
    </div>

    <div class="albums-grid" id="albums-grid"></div>
  </div>

  <!-- ALBUM VIEW -->
  <div id="view-album" style="display:none;">
    <button class="back-btn" onclick="goHome()">&#8249; Alle Alben</button>
    <div class="album-header">
      <span class="album-header-icon" id="album-icon"></span>
      <span class="album-header-title" id="album-title"></span>
      <span class="album-header-count" id="album-count"></span>
    </div>

    <div class="upload-zone" id="upload-zone"
      onclick="document.getElementById('file-input').click()"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event)">
      <div class="upload-zone-icon">⬆</div>
      <div class="upload-zone-title">Fotos hochladen</div>
      <div class="upload-zone-sub">Klicken oder Fotos hierher ziehen · JPG, PNG, WEBP</div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFileInput(event)" />

    <div class="upload-progress-wrap" id="progress-wrap"></div>
    <div class="photos-grid" id="photos-grid"></div>
    <div class="empty" id="album-empty" style="display:none;">
      <div class="empty-icon">🖼️</div>
      <div class="empty-title">Noch keine Fotos</div>
      <div class="empty-sub">Lade dein erstes Foto hoch.</div>
    </div>
  </div>

</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav" id="lb-prev" onclick="lbNav(event, -1)">&#8249;</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
  <button class="lb-nav" id="lb-next" onclick="lbNav(event, 1)">&#8250;</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── Storage helpers ──────────────────────────────────────────────────────
const ALBUMS_KEY = "ev-goss-albums";
const PHOTOS_KEY = "ev-goss-photos";

const DEFAULT_ALBUMS = [
  { id: "turnier-2024",  name: "Turnier 2024",  icon: "🏆" },
  { id: "vereinsfest",   name: "Vereinsfest",   icon: "🎉" },
  { id: "training",      name: "Training",      icon: "🎯" },
  { id: "mannschaft",    name: "Mannschaft",    icon: "👥" },
];

function loadAlbums() {
  try {
    const v = localStorage.getItem(ALBUMS_KEY);
    return v ? JSON.parse(v) : DEFAULT_ALBUMS;
  } catch { return DEFAULT_ALBUMS; }
}
function saveAlbums(a) {
  localStorage.setItem(ALBUMS_KEY, JSON.stringify(a));
}
function loadPhotos() {
  try {
    const v = localStorage.getItem(PHOTOS_KEY);
    return v ? JSON.parse(v) : {};
  } catch { return {}; }
}
function savePhotos(p) {
  try { localStorage.setItem(PHOTOS_KEY, JSON.stringify(p)); }
  catch(e) { showToast("Speicher voll – ältere Fotos löschen"); }
}

// ── State ────────────────────────────────────────────────────────────────
let albums = loadAlbums();
let photos = loadPhotos();
let currentAlbumId = null;
let lbIndex = 0;

// ── Toast ────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

// ── Badge ────────────────────────────────────────────────────────────────
function updateBadge() {
  const total = Object.values(photos).reduce((s, a) => s + (a ? a.length : 0), 0);
  document.getElementById("header-badge").textContent =
    total + " Fotos · " + albums.length + " Alben";
}

// ── Image compression ────────────────────────────────────────────────────
function compressImage(file, maxWidth = 1200, quality = 0.82) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ── HOME VIEW ────────────────────────────────────────────────────────────
function renderHome() {
  document.getElementById("view-home").style.display = "";
  document.getElementById("view-album").style.display = "none";
  currentAlbumId = null;
  renderAlbums();
  updateBadge();
}

function renderAlbums() {
  const grid = document.getElementById("albums-grid");
  grid.innerHTML = "";

  albums.forEach(album => {
    const count = (photos[album.id] || []).length;
    const thumb = (photos[album.id] || [])[0];

    const card = document.createElement("div");
    card.className = "album-card";
    card.onclick = () => openAlbum(album.id);

    const thumbDiv = document.createElement("div");
    thumbDiv.className = "album-card-thumb";
    if (thumb) {
      const img = document.createElement("img");
      img.src = thumb.src; img.alt = "";
      thumbDiv.appendChild(img);
    } else {
      const span = document.createElement("span");
      span.className = "album-card-thumb-empty";
      span.textContent = album.icon;
      thumbDiv.appendChild(span);
    }

    const name = document.createElement("div");
    name.className = "album-card-name";
    name.textContent = album.name;

    const cnt = document.createElement("div");
    cnt.className = "album-card-count";
    cnt.textContent = count + (count === 1 ? " Foto" : " Fotos");

    const delBtn = document.createElement("button");
    delBtn.className = "album-delete-btn";
    delBtn.innerHTML = "🗑";
    delBtn.onclick = e => { e.stopPropagation(); deleteAlbum(album.id); };

    card.appendChild(thumbDiv);
    card.appendChild(name);
    card.appendChild(cnt);
    card.appendChild(delBtn);
    grid.appendChild(card);
  });

  // "+ Neues Album" card
  const newCard = document.createElement("div");
  newCard.className = "album-new";
  newCard.onclick = toggleNewAlbumForm;
  newCard.innerHTML = '<span style="font-size:28px">＋</span><span>Neues Album</span>';
  grid.appendChild(newCard);
}

function toggleNewAlbumForm() {
  const form = document.getElementById("new-album-form");
  const visible = form.style.display !== "none";
  form.style.display = visible ? "none" : "flex";
  if (!visible) setTimeout(() => document.getElementById("new-album-input").focus(), 50);
}
function hideNewAlbumForm() {
  document.getElementById("new-album-form").style.display = "none";
  document.getElementById("new-album-input").value = "";
}
function handleAlbumFormKey(e) {
  if (e.key === "Enter") createAlbum();
  if (e.key === "Escape") hideNewAlbumForm();
}
function createAlbum() {
  const name = document.getElementById("new-album-input").value.trim();
  if (!name) return;
  const album = { id: "album-" + Date.now(), name, icon: "📁" };
  albums.push(album);
  saveAlbums(albums);
  hideNewAlbumForm();
  renderAlbums();
  updateBadge();
  showToast('Album "' + name + '" erstellt');
}
function deleteAlbum(id) {
  if (!confirm("Album wirklich löschen?")) return;
  albums = albums.filter(a => a.id !== id);
  delete photos[id];
  saveAlbums(albums);
  savePhotos(photos);
  renderAlbums();
  updateBadge();
  showToast("Album gelöscht");
}

// ── ALBUM VIEW ───────────────────────────────────────────────────────────
function openAlbum(id) {
  currentAlbumId = id;
  const album = albums.find(a => a.id === id);
  document.getElementById("view-home").style.display = "none";
  document.getElementById("view-album").style.display = "";
  document.getElementById("album-icon").textContent = album.icon;
  document.getElementById("album-title").textContent = album.name;
  renderPhotos();
  updateBadge();
}
function goHome() { renderHome(); }

function renderPhotos() {
  const ps = photos[currentAlbumId] || [];
  document.getElementById("album-count").textContent = ps.length + " Fotos";
  document.getElementById("album-empty").style.display = ps.length ? "none" : "";

  const grid = document.getElementById("photos-grid");
  grid.innerHTML = "";
  ps.forEach((photo, idx) => {
    const item = document.createElement("div");
    item.className = "photo-item";
    item.onclick = () => openLightbox(idx);

    const img = document.createElement("img");
    img.src = photo.src; img.alt = photo.name; img.loading = "lazy";

    const overlay = document.createElement("div");
    overlay.className = "photo-overlay";

    const delBtn = document.createElement("button");
    delBtn.className = "photo-del-btn";
    delBtn.innerHTML = "🗑";
    delBtn.onclick = e => { e.stopPropagation(); deletePhoto(photo.id); };

    overlay.appendChild(delBtn);
    item.appendChild(img);
    item.appendChild(overlay);
    grid.appendChild(item);
  });
}

function deletePhoto(photoId) {
  photos[currentAlbumId] = (photos[currentAlbumId] || []).filter(p => p.id !== photoId);
  savePhotos(photos);
  renderPhotos();
  updateBadge();
  showToast("Foto gelöscht");
}

// ── FILE UPLOAD ──────────────────────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById("upload-zone").classList.add("drag-over"); }
function onDragLeave() { document.getElementById("upload-zone").classList.remove("drag-over"); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById("upload-zone").classList.remove("drag-over");
  handleFiles(e.dataTransfer.files);
}
function handleFileInput(e) {
  handleFiles(e.target.files);
  e.target.value = "";
}

async function handleFiles(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith("image/"));
  if (!arr.length) return;

  const wrap = document.getElementById("progress-wrap");
  wrap.innerHTML = "";

  // Create progress bars
  const bars = arr.map(f => {
    const row = document.createElement("div"); row.className = "upload-progress";
    const name = document.createElement("span"); name.className = "upload-progress-name"; name.textContent = f.name;
    const barWrap = document.createElement("div"); barWrap.className = "upload-bar-wrap";
    const bar = document.createElement("div"); bar.className = "upload-bar"; bar.style.width = "0%";
    const pct = document.createElement("span"); pct.className = "upload-pct"; pct.textContent = "0%";
    barWrap.appendChild(bar); row.appendChild(name); row.appendChild(barWrap); row.appendChild(pct);
    wrap.appendChild(row);
    return { bar, pct };
  });

  if (!photos[currentAlbumId]) photos[currentAlbumId] = [];

  for (let i = 0; i < arr.length; i++) {
    const src = await compressImage(arr[i]);
    photos[currentAlbumId].push({ id: "p" + Date.now() + i, src, name: arr[i].name, date: new Date().toLocaleDateString("de-AT") });
    bars[i].bar.style.width = "100%";
    bars[i].pct.textContent = "100%";
  }

  savePhotos(photos);
  setTimeout(() => { wrap.innerHTML = ""; }, 800);
  renderPhotos();
  updateBadge();
  showToast(arr.length + " Foto" + (arr.length > 1 ? "s" : "") + " hochgeladen");
}

// ── LIGHTBOX ─────────────────────────────────────────────────────────────
function openLightbox(idx) {
  lbIndex = idx;
  const ps = photos[currentAlbumId] || [];
  document.getElementById("lightbox-img").src = ps[lbIndex].src;
  document.getElementById("lb-counter").textContent = (lbIndex + 1) + " / " + ps.length;
  const showNav = ps.length > 1;
  document.getElementById("lb-prev").style.display = showNav ? "" : "none";
  document.getElementById("lb-next").style.display = showNav ? "" : "none";
  document.getElementById("lightbox").classList.add("active");
}
function closeLightbox() { document.getElementById("lightbox").classList.remove("active"); }
function lbNav(e, dir) {
  e.stopPropagation();
  const ps = photos[currentAlbumId] || [];
  lbIndex = (lbIndex + dir + ps.length) % ps.length;
  document.getElementById("lightbox-img").src = ps[lbIndex].src;
  document.getElementById("lb-counter").textContent = (lbIndex + 1) + " / " + ps.length;
}
document.addEventListener("keydown", e => {
  const lb = document.getElementById("lightbox");
  if (!lb.classList.contains("active")) return;
  if (e.key === "ArrowLeft") lbNav({ stopPropagation: ()=>{} }, -1);
  if (e.key === "ArrowRight") lbNav({ stopPropagation: ()=>{} }, 1);
  if (e.key === "Escape") closeLightbox();
});

// ── INIT ─────────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
